
<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHABAD HOUSE | Pro Admin</title>
    <style>
        :root { --bg: #f1f5f9; --primary: #2563eb; --text: #0f172a; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 180px 10px 450px 10px; overflow-x: hidden; }

        header { position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 100; border-bottom: 2px solid #000; height: 170px; }
        .brand { background: #000; color: #fff; text-align: center; padding: 5px; font-weight: bold; font-size: 14px; }
        
        /* New Info Bar */
        .info-bar { display: flex; gap: 5px; padding: 8px 10px 0 10px; }
        .info-bar input { border: 1px solid #cbd5e1; border-radius: 5px; padding: 5px; font-size: 12px; }
        #user-name { flex: 2; }
        #work-month { flex: 1; }

        .input-bar { padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        #base-salary { width: 90px; padding: 8px; border: 2px solid #000; border-radius: 8px; font-weight: bold; font-size: 18px; }
        .pay-box { text-align: right; background: #dcfce7; padding: 5px 12px; border-radius: 10px; border: 2px solid #16a34a; }
        .summary { display: grid; grid-template-columns: 1fr 1fr; background: #e2e8f0; padding: 6px 15px; font-size: 11px; font-weight: bold; }

        #list { padding-bottom: 100px; }
        .row { display: flex; align-items: center; padding: 10px; background: #fff; margin-bottom: 2px; border-radius: 8px; }
        .day { width: 30px; font-weight: bold; color: #64748b; }
        .boxes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; flex: 1; }
        .box { background: #f8fafc; height: 40px; line-height: 40px; text-align: center; border-radius: 6px; border: 1.5px solid #cbd5e1; font-weight: bold; font-size: 13px; }
        .box.active { border-color: var(--primary); background: #eff6ff; border-width: 3px; outline: none; }

        #report-view { display: none; position: fixed; inset: 0; background: #fff; z-index: 500; overflow-y: auto; padding: 15px; }
        .report-card { border: 2px solid #000; padding: 15px; background: #fff; }
        .report-table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        .report-table th, .report-table td { border: 1px solid #000; padding: 6px; text-align: center; font-size: 12px; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .stat-item { padding: 10px; border: 1px solid #000; border-radius: 5px; background: #f8fafc; }

        .keypad { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; z-index: 200; transform: translateY(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-top: 3px solid #000; border-radius: 20px 20px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.2); }
        .keypad.open { transform: translateY(0); }
        .key-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 15px; }
        .key-grid button { padding: 15px; font-size: 22px; font-weight: bold; border-radius: 10px; border: 1.5px solid #000; background: #f1f5f9; touch-action: manipulation; }
    </style>
</head>
<body>

<div id="edit-view">
    <header>
        <div class="brand">CHABAD HOUSE | SYSTEM</div>
        <div class="info-bar">
            <input type="text" id="user-name" placeholder="အမည်ထည့်ပါ">
            <input type="month" id="work-month">
        </div>
        <div class="input-bar">
            <div>
                <small style="font-weight:bold;">Base Salary</small><br>
                <input type="number" id="base-salary" value="12000" oninput="calc()">
            </div>
            <div class="pay-box">
                <small>NET SALARY</small>
                <div id="final-pay" style="font-size:20px; font-weight:900; color:#16a34a;">0</div>
            </div>
        </div>
        <div class="summary">
            <div>TOTAL HRS: <span id="gt">0:00</span></div>
            <div style="text-align: right;">OT HRS: <span id="ot">0:00</span></div>
        </div>
    </header>
    <div id="list"></div>
</div>

<div id="report-view">
    <div id="capture-area" class="report-card">
        <div style="text-align:center; border-bottom:3px solid #000; padding-bottom:10px;">
            <h2 style="margin:0;">CHABAD HOUSE</h2>
            <p style="margin:5px 0; font-weight:bold;">WORK STATEMENT & SALARY SLIP</p>
        </div>
        
        <div style="display: flex; justify-content: space-between; font-size: 13px; padding: 10px 0; font-weight: bold;">
            <span>NAME: <span id="r-name">-</span></span>
            <span>DATE: <span id="r-month">-</span></span>
        </div>

        <table class="report-table">
            <thead><tr><th>Date</th><th>Shift 1</th><th>Shift 2</th><th>Total</th></tr></thead>
            <tbody id="report-body"></tbody>
        </table>
        
        <div class="stat-grid">
            <div class="stat-item">Normal Hours:<br><b>234:00 hr</b></div>
            <div class="stat-item">OT Hours:<br><b id="r-ot-hr">0:00 hr</b></div>
            <div class="stat-item">Base Pay:<br><b id="r-base-val">0</b></div>
            <div class="stat-item">OT Pay (x57):<br><b id="r-ot-val">0</b></div>
            <div class="stat-item" style="grid-column: span 2; background: #000; color: #fff; text-align: center;">
                TOTAL PAYABLE: <br><b id="r-grand-val" style="font-size:18px;">0 MMK</b>
            </div>
        </div>
        <div style="font-size: 9px; color: #64748b; margin-top: 10px; text-align: center;">
            Generated on: <span id="report-date"></span>
        </div>
    </div>
    <div style="margin-top:20px; display:flex; justify-content: center; padding-bottom: 50px;">
        <button onclick="closeReport()" style="padding:12px 40px; border-radius:30px; background:#64748b; color:white; border:none; font-weight:bold;">BACK</button>
    </div>
</div>

<div id="keypad" class="keypad">
    <div class="key-grid">
        <button onclick="key(1)">1</button><button onclick="key(2)">2</button><button onclick="key(3)">3</button>
        <button onclick="key(4)">4</button><button onclick="key(5)">5</button><button onclick="key(6)">6</button>
        <button onclick="key(7)">7</button><button onclick="key(8)">8</button><button onclick="key(9)">9</button>
        <button onclick="key('AC')">AC</button><button onclick="key(0)">0</button><button onclick="key('DEL')">⌫</button>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; padding:0 15px 15px 15px;">
        <button onclick="nextRow()" style="background:#64748b; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold;">NEXT DAY</button>
        <button onclick="closeK()" style="background:#000; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold;">DONE</button>
        <button onclick="finishDraft()" style="background:#16a34a; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold;">FINISH</button>
    </div>
</div>

<script>
    let active = null; let boxes = [];
    const list = document.getElementById('list');

    // Create 31 rows
    for(let d=1; d<=31; d++) {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `<div class="day">${d}</div><div class="boxes">
            <div class="box" data-id="${(d-1)*4+0}" onclick="openK(this)"></div>
            <div class="box" data-id="${(d-1)*4+1}" onclick="openK(this)"></div>
            <div class="box" data-id="${(d-1)*4+2}" onclick="openK(this)"></div>
            <div class="box" data-id="${(d-1)*4+3}" onclick="openK(this)"></div>
        </div><div style="width:55px; text-align:right; font-weight:bold; color:var(--primary); font-size:12px;" id="dh-${d}">0:00</div>`;
        list.appendChild(row);
    }
    boxes = Array.from(document.querySelectorAll('.box'));

    // Set Current Month as default
    const now = new Date();
    document.getElementById('work-month').value = now.toISOString().substring(0, 7);

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('chabad_pro_v2') || '{}');
        Object.keys(saved).forEach(id => { if(boxes[id]) boxes[id].innerText = saved[id]; });
        document.getElementById('user-name').value = localStorage.getItem('chabad_user') || "";
        calc();
    };

    function openK(el) {
        if(active) active.classList.remove('active');
        active = el; active.classList.add('active');
        document.getElementById('keypad').classList.add('open');
        setTimeout(() => {
            const rect = el.getBoundingClientRect();
            const keypadTop = window.innerHeight - 350; 
            if (rect.bottom > keypadTop) {
                window.scrollBy({ top: rect.bottom - keypadTop + 20, behavior: 'smooth' });
            }
        }, 300);
    }

    function closeK() {
        if(active) active.classList.remove('active');
        document.getElementById('keypad').classList.remove('open');
        active = null;
    }

    function nextRow() {
        if(!active) return;
        let next = (Math.floor(parseInt(active.dataset.id) / 4) + 1) * 4;
        if(next < boxes.length) openK(boxes[next]); else closeK();
    }

    function key(v) {
        if(!active) return;
        let s = active.innerText.replace(":","");
        if(v === 'AC') s = "";
        else if(v === 'DEL') s = s.slice(0,-1);
        else if(s.length < 4) s += v;
        active.innerText = s.length >= 3 ? s.substring(0,2)+":"+s.substring(2,4) : s;
        saveData();
        calc();
        if(s.length === 4) {
            let n = parseInt(active.dataset.id) + 1;
            if(n < boxes.length) setTimeout(() => openK(boxes[n]), 100);
        }
    }

    function saveData() {
        localStorage.setItem('chabad_pro_v2', JSON.stringify(Object.fromEntries(boxes.map((b,i)=>[i,b.innerText]))));
        localStorage.setItem('chabad_user', document.getElementById('user-name').value);
    }

    function formatTime(totalMinutes) {
        let h = Math.floor(totalMinutes / 60);
        let m = Math.round(totalMinutes % 60);
        return h + ":" + (m < 10 ? "0" + m : m);
    }

    function calc() {
        let totalMin = 0;
        let base = parseFloat(document.getElementById('base-salary').value) || 0;
        
        for(let d=1; d<=31; d++) {
            let dMin = 0;
            let b = boxes.slice((d-1)*4, d*4);
            [0, 2].forEach(i => {
                let sStr = b[i].innerText, eStr = b[i+1].innerText;
                if(sStr.length === 5 && eStr.length === 5) {
                    let sM = parseInt(sStr.split(':')[0])*60 + parseInt(sStr.split(':')[1]);
                    let eM = parseInt(eStr.split(':')[0])*60 + parseInt(eStr.split(':')[1]);
                    dMin += (eM >= sM) ? (eM - sM) : (1440 - sM + eM);
                }
            });
            totalMin += dMin;
            document.getElementById(`dh-${d}`).innerText = formatTime(dMin);
        }
        
        let otMin = totalMin > (234 * 60) ? totalMin - (234 * 60) : 0;
        let otPay = Math.round((otMin / 60) * 57);
        let grand = Math.round(base + otPay);

        document.getElementById('gt').innerText = formatTime(totalMin);
        document.getElementById('ot').innerText = formatTime(otMin);
        document.getElementById('final-pay').innerText = grand.toLocaleString();
        
        document.getElementById('r-ot-hr').innerText = formatTime(otMin) + " hr";
        document.getElementById('r-base-val').innerText = base.toLocaleString();
        document.getElementById('r-ot-val').innerText = otPay.toLocaleString();
        document.getElementById('r-grand-val').innerText = grand.toLocaleString() + " MMK";
    }

    function finishDraft() {
        saveData();
        closeK();
        document.getElementById('edit-view').style.display = 'none';
        document.getElementById('report-view').style.display = 'block';
        
        // Update Info in Report
        document.getElementById('r-name').innerText = document.getElementById('user-name').value || "-";
        document.getElementById('r-month').innerText = document.getElementById('work-month').value || "-";
        document.getElementById('report-date').innerText = new Date().toLocaleString();
        
        const body = document.getElementById('report-body');
        body.innerHTML = "";
        for(let d=1; d<=31; d++) {
            let timeStr = document.getElementById(`dh-${d}`).innerText;
            if(timeStr !== "0:00") {
                let b = boxes.slice((d-1)*4, d*4).map(x => x.innerText || "-");
                body.innerHTML += `<tr><td>${d}</td><td>${b[0]}-${b[1]}</td><td>${b[2]}-${b[3]}</td><td><b>${timeStr}</b></td></tr>`;
            }
        }
    }

    function closeReport() { 
        document.getElementById('report-view').style.display = 'none'; 
        document.getElementById('edit-view').style.display = 'block'; 
    }
</script>
</body>
</html>
