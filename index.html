<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHABAD HOUSE | Admin</title>
    <style>
        :root { --bg: #f8fafc; --primary: #2563eb; --danger: #ef4444; --success: #16a34a; --grey: #94a3b8; --border: #cbd5e1; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 220px 10px 50px 10px; transition: padding 0.3s; }
        body.keypad-open { padding-bottom: 380px; }

        header { position: fixed; top: 0; left: 0; right: 0; background: #fff; z-index: 100; border-bottom: 2px solid #000; height: 210px; }
        .header-top { background: #000; color: #fff; display: flex; justify-content: space-between; align-items: center; padding: 5px 15px; }
        .info-bar { display: flex; gap: 5px; padding: 8px 10px 0 10px; }
        .info-bar input { border: 1px solid var(--border); border-radius: 5px; padding: 8px; font-size: 14px; outline: none; flex: 1; }
        #user-name { border: 2px solid var(--primary); }
        .input-bar { padding: 8px 10px; display: flex; justify-content: space-between; align-items: center; }
        #base-salary { width: 90px; padding: 8px; border: 2px solid #000; border-radius: 8px; font-weight: bold; font-size: 18px; }
        .pay-box { text-align: right; background: #dcfce7; padding: 5px 12px; border-radius: 10px; border: 2px solid var(--success); }
        .summary { display: grid; grid-template-columns: 1fr 1fr; background: #e2e8f0; padding: 6px 15px; font-size: 11px; font-weight: bold; }

        /* Search Section */
        .history-panel { background: #fff; margin: 10px 0; padding: 12px; border-radius: 10px; border: 1px solid var(--border); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        #search-box { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--grey); box-sizing: border-box; font-size: 14px; outline: none; }
        #history-list { display: none; margin-top: 10px; max-height: 200px; overflow-y: auto; border-top: 1px solid #eee; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table td { padding: 12px 8px; border-bottom: 1px solid #f1f5f9; }
        .btn-v { background: var(--primary); color: #fff; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; margin-right: 4px; }
        .btn-d { background: var(--danger); color: #fff; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; }

        /* Rows */
        .row { display: flex; align-items: center; padding: 10px; background: #fff; margin-bottom: 4px; border-radius: 8px; border: 1px solid #eee; }
        .day { width: 30px; font-weight: bold; color: #64748b; }
        .boxes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; flex: 1; }
        .box { background: #fff; height: 42px; line-height: 42px; text-align: center; border-radius: 6px; border: 1px solid var(--border); font-weight: bold; font-size: 14px; }
        .box.active { border: 2px solid var(--primary); background: #f0f7ff; }

        /* Custom Modal */
        #confirm-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #fff; padding: 25px; border-radius: 15px; width: 100%; max-width: 300px; text-align: center; }
        .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }

        /* Keypad */
        .keypad { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; z-index: 200; transform: translateY(100%); transition: 0.3s; border-top: 2px solid #000; border-radius: 20px 20px 0 0; }
        .keypad.open { transform: translateY(0); }
        .key-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .key-grid button { padding: 15px; font-size: 22px; font-weight: bold; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; }
        .key-grid button:active { background: #dbeafe; transform: scale(0.95); }
        .ctrl-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 0 15px 15px 15px; }
        .ctrl-btns button { padding: 12px 2px; border-radius: 8px; border: none; font-weight: bold; color: white; font-size: 10px; }

        /* Report */
        #report-view { display: none; position: fixed; inset: 0; background: #fff; z-index: 500; overflow-y: auto; padding: 15px; }
        .report-card { border: 1.5px solid #000; padding: 15px; background: #fff; }
        .report-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        .report-table th, .report-table td { border: 1px solid #000; padding: 6px; text-align: center; font-size: 11px; }
        .report-summary { background: #f8fafc; border: 1px dashed #475569; padding: 10px; margin-top: 10px; font-size: 13px; }
    </style>
</head>
<body onclick="handleBackdrop(event)">

<div id="edit-view">
    <header>
        <div class="header-top">
            <span style="font-weight:bold;">CHABAD HOUSE</span>
            <button onclick="confirmClear()" style="background:var(--danger); color:white; border:none; padding:4px 10px; border-radius:4px; font-size:11px;">NEW</button>
        </div>
        <div class="info-bar">
            <input type="text" id="user-name" placeholder="အမည်ရိုက်ပါ">
            <input type="month" id="work-month">
        </div>
        <div class="input-bar">
            <input type="number" id="base-salary" value="12000" oninput="calc()">
            <div class="pay-box">
                <small>NET SALARY</small>
                <div id="final-pay" style="font-size:20px; font-weight:900; color:var(--success);">0</div>
            </div>
        </div>
        <div class="summary">
            <div>TOTAL HRS: <span id="gt">0:00</span></div>
            <div style="text-align: right;">OT HRS: <span id="ot">0:00</span></div>
        </div>
    </header>

    <div class="history-panel">
        <input type="text" id="search-box" placeholder="🔍 နာမည်ဖြင့် ရှာဖွေရန်..." oninput="handleSearch()">
        <div id="history-list">
            <table class="data-table">
                <tbody id="history-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="list"></div>
</div>

<div id="confirm-modal">
    <div class="modal-box">
        <h3 style="margin:0; color:var(--danger);">ဖျက်ရန် သေချာပါသလား?</h3>
        <p style="font-size:14px; margin-top:10px;">ဤမှတ်တမ်းကို အပြီးအပိုင် ဖျက်ပါမည်။</p>
        <div class="modal-btns">
            <button style="padding:12px; border-radius:8px; border:none; background:#eee;" onclick="closeConfirm()">Cancel</button>
            <button style="padding:12px; border-radius:8px; border:none; background:var(--danger); color:white; font-weight:bold;" id="btn-confirm-del">ဖျက်မည်</button>
        </div>
    </div>
</div>

<div id="report-view">
    <div class="report-card">
        <h2 style="text-align:center; margin:0; font-size: 18px;">CHABAD HOUSE</h2>
        <p style="text-align:center; font-weight:bold;">WORK STATEMENT</p>
        <div style="display:flex; justify-content: space-between; font-size:12px; border-top:1px solid #000; padding:10px 0;">
            <span>NAME: <b id="r-name">-</b></span>
            <span>MONTH: <b id="r-month">-</b></span>
        </div>
        <table class="report-table">
            <thead><tr><th>Day</th><th>Shift 1</th><th>Shift 2</th><th>Total</th></tr></thead>
            <tbody id="report-body"></tbody>
        </table>
        <div class="report-summary">
            <div style="display:flex; justify-content:space-between;"><span>Total Hrs:</span><b id="r-total-hrs">0:00</b></div>
            <div style="display:flex; justify-content:space-between;"><span>OT Hrs:</span><b id="r-ot-hrs">0:00</b></div>
            <div style="display:flex; justify-content:space-between; color: var(--success);"><span>OT Pay:</span><b id="r-ot-pay">0</b></div>
            <div style="display:flex; justify-content:space-between; font-size:16px; font-weight:bold; border-top:2px solid #000; margin-top:10px; padding-top:10px;">
                <span>NET PAY:</span><span id="r-grand-total">0 MMK</span>
            </div>
        </div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:20px 0;">
        <button style="padding:15px; border-radius:10px; background:#64748b; color:white; border:none;" onclick="closeReport()">BACK</button>
        <button style="padding:15px; border-radius:10px; background:var(--primary); color:white; border:none;" onclick="switchToEdit()">EDIT</button>
    </div>
</div>

<div id="keypad" class="keypad" onclick="event.stopPropagation()">
    <div class="key-grid">
        <button onclick="key(1)">1</button><button onclick="key(2)">2</button><button onclick="key(3)">3</button>
        <button onclick="key(4)">4</button><button onclick="key(5)">5</button><button onclick="key(6)">6</button>
        <button onclick="key(7)">7</button><button onclick="key(8)">8</button><button onclick="key(9)">9</button>
        <button onclick="key('AC')" style="color:var(--danger)">AC</button><button onclick="key(0)">0</button><button onclick="key('DEL')">⌫</button>
    </div>
    <div class="ctrl-btns">
        <button onclick="closeK()" style="background:#64748b;">DONE</button>
        <button onclick="nextRow()" style="background:#1e293b;">NEXT</button>
        <button onclick="saveToDB()" style="background:var(--primary);">SAVE</button>
        <button onclick="finishDraft()" style="background:var(--success);">PREVIEW</button>
    </div>
</div>

<script>
    let active = null; let boxes = []; let pendingDelId = null;
    const list = document.getElementById('list');

    // Generate 31 days
    for(let d=1; d<=31; d++) {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `<div class="day">${d}</div><div class="boxes">
            <div class="box" data-id="${(d-1)*4+0}" onclick="openK(event, this)"></div>
            <div class="box" data-id="${(d-1)*4+1}" onclick="openK(event, this)"></div>
            <div class="box" data-id="${(d-1)*4+2}" onclick="openK(event, this)"></div>
            <div class="box" data-id="${(d-1)*4+3}" onclick="openK(event, this)"></div>
        </div><div style="width:50px; text-align:right; font-weight:bold; color:var(--primary); font-size:11px;" id="dh-${d}">0:00</div>`;
        list.appendChild(row);
    }
    boxes = Array.from(document.querySelectorAll('.box'));

    window.onload = () => {
        document.getElementById('work-month').value = new Date().toISOString().substring(0, 7);
        calc();
    };

    // SEARCH FUNCTION
    function handleSearch() {
        const query = document.getElementById('search-box').value.trim().toLowerCase();
        const listDiv = document.getElementById('history-list');
        const tableBody = document.getElementById('history-table-body');
        
        if (query.length > 0) {
            const db = JSON.parse(localStorage.getItem('chabad_records') || '[]');
            const filtered = db.filter(r => r.name.toLowerCase().includes(query));
            
            if (filtered.length > 0) {
                listDiv.style.display = 'block';
                tableBody.innerHTML = filtered.map(r => `
                    <tr>
                        <td><b>${r.name}</b><br><small>${r.month}</small></td>
                        <td style="text-align:right;">
                            <button class="btn-v" onclick="previewRecord('${r.id}')">View</button>
                            <button class="btn-d" onclick="askDelete('${r.id}')">Del</button>
                        </td>
                    </tr>
                `).join('');
            } else { tableBody.innerHTML = "<tr><td colspan='2' style='text-align:center;'>မရှိပါ</td></tr>"; }
        } else { listDiv.style.display = 'none'; }
    }

    function askDelete(id) { pendingDelId = id; document.getElementById('confirm-modal').style.display = 'flex'; }
    function closeConfirm() { document.getElementById('confirm-modal').style.display = 'none'; }
    document.getElementById('btn-confirm-del').onclick = () => {
        let db = JSON.parse(localStorage.getItem('chabad_records') || '[]');
        db = db.filter(r => String(r.id) !== String(pendingDelId));
        localStorage.setItem('chabad_records', JSON.stringify(db));
        handleSearch(); closeConfirm();
    };

    function previewRecord(id) {
        const db = JSON.parse(localStorage.getItem('chabad_records') || '[]');
        const r = db.find(item => String(item.id) === String(id));
        if(!r) return;
        document.getElementById('user-name').value = r.name;
        document.getElementById('work-month').value = r.month;
        document.getElementById('base-salary').value = r.salary;
        r.hours.forEach((h, i) => { if(boxes[i]) boxes[i].innerText = h; });
        calc(); 
        document.getElementById('history-list').style.display = 'none';
        document.getElementById('search-box').value = "";
    }

    // SAVE FUNCTION
    function saveToDB() {
        const name = document.getElementById('user-name').value.trim();
        const month = document.getElementById('work-month').value;
        if(!name) return alert("အမည်ထည့်ပါ။");
        
        const data = { 
            id: Date.now(), 
            name: name, 
            month: month, 
            salary: document.getElementById('base-salary').value, 
            hours: boxes.map(b => b.innerText) 
        };
        
        let db = JSON.parse(localStorage.getItem('chabad_records') || '[]');
        // နာမည်တူရှိရင် အဟောင်းကိုဖျက်ပြီး အသစ်သွင်း
        db = db.filter(r => !(r.name === name && r.month === month));
        db.push(data);
        localStorage.setItem('chabad_records', JSON.stringify(db));
        alert("သိမ်းဆည်းပြီးပါပြီ။");
        closeK();
    }

    function openK(e, el) {
        e.stopPropagation();
        if(active) active.classList.remove('active');
        active = el; active.classList.add('active');
        document.getElementById('keypad').classList.add('open');
        document.body.classList.add('keypad-open');
        
        // Auto Scroll
        setTimeout(() => {
            const y = el.getBoundingClientRect().top + window.pageYOffset - 230;
            window.scrollTo({top: y, behavior: 'smooth'});
        }, 300);
    }
    function closeK() {
        if(active) active.classList.remove('active');
        document.getElementById('keypad').classList.remove('open');
        document.body.classList.remove('keypad-open');
        active = null;
    }
    function handleBackdrop(e) { if (!document.getElementById('keypad').contains(e.target)) closeK(); }

    function key(v) {
        if(!active) return;
        let s = active.innerText.replace(":","");
        if(v === 'AC') s = ""; else if(v === 'DEL') s = s.slice(0,-1);
        else if(s.length < 4) s += v;
        active.innerText = s.length >= 3 ? s.substring(0,2)+":"+s.substring(2,4) : s;
        calc();
        if(s.length === 4) {
            let n = parseInt(active.dataset.id) + 1;
            if(n < boxes.length) boxes[n].click();
        }
    }
    function nextRow() {
        if(!active) return;
        let next = (Math.floor(parseInt(active.dataset.id)/4)+1)*4;
        if(next < boxes.length) boxes[next].click();
    }

    function calc() {
        let totalMin = 0;
        let base = parseFloat(document.getElementById('base-salary').value) || 0;
        for(let d=1; d<=31; d++) {
            let dMin = 0;
            let b = boxes.slice((d-1)*4, d*4);
            [0, 2].forEach(i => {
                let sStr = b[i].innerText, eStr = b[i+1].innerText;
                if(sStr.length === 5 && eStr.length === 5) {
                    let sM = parseInt(sStr.split(':')[0])*60 + parseInt(sStr.split(':')[1]);
                    let eM = parseInt(eStr.split(':')[0])*60 + parseInt(eStr.split(':')[1]);
                    dMin += (eM >= sM) ? (eM - sM) : (1440 - sM + eM);
                }
            });
            totalMin += dMin;
            document.getElementById(`dh-${d}`).innerText = Math.floor(dMin/60) + ":" + (dMin%60 < 10 ? "0"+(dMin%60) : dMin%60);
        }
        let otMin = totalMin > (234*60) ? totalMin - (234*60) : 0;
        let otPay = Math.round((otMin/60)*57);
        let grand = base + otPay;
        document.getElementById('gt').innerText = Math.floor(totalMin/60) + ":" + (totalMin%60 < 10 ? "0"+(totalMin%60) : totalMin%60);
        document.getElementById('ot').innerText = Math.floor(otMin/60) + ":" + (otMin%60 < 10 ? "0"+(otMin%60) : otMin%60);
        document.getElementById('final-pay').innerText = grand.toLocaleString();
        return { otPay, grand };
    }

    function finishDraft() {
        const d = calc(); closeK();
        document.getElementById('edit-view').style.display = 'none';
        document.getElementById('report-view').style.display = 'block';
        document.getElementById('r-name').innerText = document.getElementById('user-name').value || "-";
        document.getElementById('r-month').innerText = document.getElementById('work-month').value || "-";
        document.getElementById('r-total-hrs').innerText = document.getElementById('gt').innerText;
        document.getElementById('r-ot-hrs').innerText = document.getElementById('ot').innerText;
        document.getElementById('r-ot-pay').innerText = d.otPay.toLocaleString() + " MMK";
        document.getElementById('r-grand-total').innerText = d.grand.toLocaleString() + " MMK";
        const body = document.getElementById('report-body'); body.innerHTML = "";
        for(let d=1; d<=31; d++) {
            let timeStr = document.getElementById(`dh-${d}`).innerText;
            if(timeStr !== "0:00") {
                let b = boxes.slice((d-1)*4, d*4).map(x => x.innerText || "-");
                body.innerHTML += `<tr><td>${d}</td><td>${b[0]}-${b[1]}</td><td>${b[2]}-${b[3]}</td><td><b>${timeStr}</b></td></tr>`;
            }
        }
    }

    function confirmClear() { if(confirm("ဒေတာအသစ်ရိုက်မလား?")) { boxes.forEach(b => b.innerText = ""); calc(); } }
    function closeReport() { document.getElementById('report-view').style.display = 'none'; document.getElementById('edit-view').style.display = 'block'; }
    function switchToEdit() { closeReport(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
</script>
</body>
</html>
